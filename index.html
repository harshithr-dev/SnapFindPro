<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFind Pro | AI Image Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SnapFind <span>Pro</span></h1>
            <p>Upload a photo to find matching products instantly.</p>
        </header>

        <main>
            <div class="upload-section">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <label for="imageInput" class="upload-btn">Choose Image</label>
                <div id="previewContainer" class="hidden">
                    <img id="imagePreview" src="" alt="Preview">
                </div>
                <button id="searchBtn" class="search-btn hidden">Analyze & Search</button>
            </div>

            <div id="loader" class="loader hidden"></div>

            <div id="resultsSection" class="hidden">
                <h3>Detected Labels:</h3>
                <div id="tagsContainer" class="tags"></div>
                
                <h3>Matched Products:</h3>
                <div id="productsGrid" class="grid"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
